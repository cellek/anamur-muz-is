# Haftalık veri yedeği: tüm ilanları backups/ klasörüne JSON olarak
# kaydeder ve değişiklik varsa depoya işler. Veritabanı kaybında
# ilanlar bu dosyalardan geri yüklenebilir.
name: Haftalik veri yedegi

on:
  schedule:
    - cron: "47 6 * * 1" # her Pazartesi 06:47 UTC (09:47 TSİ)
  workflow_dispatch: # elle tetikleme (test için)

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tablolari disa aktar
        env:
          SUPABASE_URL: https://wsnodkkvyubtvqcxrspl.supabase.co
          # anon key zaten herkese açık (docs/config.js) — sır değildir.
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indzbm9ka2t2eXVidHZxY3hyc3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTA4NDEsImV4cCI6MjA5OTA4Njg0MX0.geanf5ReS08XX4OsLV9m6xNOIxcjRGsEM7E9ZCOWLwU
        run: |
          mkdir -p backups
          python3 - <<'PY'
          import json, os, urllib.request

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_ANON_KEY"]

          def fetch(table):
              rows, offset = [], 0
              while True:
                  req = urllib.request.Request(
                      f"{url}/rest/v1/{table}?select=*&order=created_at.asc&limit=1000&offset={offset}",
                      headers={"apikey": key, "Authorization": f"Bearer {key}"},
                  )
                  batch = json.load(urllib.request.urlopen(req, timeout=30))
                  rows += batch
                  if len(batch) < 1000:
                      return rows
                  offset += 1000

          for table in ("jobs", "workers"):
              rows = fetch(table)
              with open(f"backups/{table}.json", "w", encoding="utf-8") as f:
                  json.dump(rows, f, ensure_ascii=False, indent=2)
                  f.write("\n")
              print(f"{table}: {len(rows)} kayit yedeklendi")
          PY

      - name: Degisiklik varsa depoya isle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups
          if git diff --cached --quiet; then
            echo "Degisiklik yok, yedek guncel."
          else
            git commit -m "Haftalik veri yedegi"
            git push
          fi
